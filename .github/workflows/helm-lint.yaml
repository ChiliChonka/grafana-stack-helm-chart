name: helm-lint

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Grafana Helm repository
        run: helm repo add grafana https://grafana.github.io/helm-charts

      - name: Update chart dependencies
        run: helm dependency update grafana-stack

      - name: Lint chart (CI values)
        run: |
          helm lint grafana-stack \
            --strict \
            --values grafana-stack/values.ci.yaml

      - name: Render templates (CI values)
        run: |
          helm template grafana-stack grafana-stack \
            --namespace observability \
            --values grafana-stack/values.ci.yaml \
            > /tmp/rendered.yaml
