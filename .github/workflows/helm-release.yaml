name: helm-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Grafana Helm repository
        run: helm repo add grafana https://grafana.github.io/helm-charts

      - name: Update chart dependencies
        run: helm dependency update charts/grafana-stack

      - name: Lint chart before release
        run: helm lint charts/grafana-stack --strict

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package chart
        run: |
          helm package charts/grafana-stack \
            --version "${{ steps.version.outputs.version }}" \
            --destination /tmp/helm-packages

      - name: Push chart to OCI registry
        run: |
          helm push \
            /tmp/helm-packages/grafana-stack-${{ steps.version.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/helm-packages/grafana-stack-${{ steps.version.outputs.version }}.tgz
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            helm install grafana-stack \
              oci://ghcr.io/${{ github.repository_owner }}/charts/grafana-stack \
              --version ${{ steps.version.outputs.version }} \
              -n observability \
              --create-namespace
            ```
