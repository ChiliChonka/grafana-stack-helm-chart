name: Release Helm Chart

on:
  push:
    tags:
      - "chart-*"

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Grafana Helm repository
        run: helm repo add grafana https://grafana.github.io/helm-charts

      - name: Update chart dependencies
        run: helm dependency update charts/grafana-stack

      - name: Lint chart before release
        run: helm lint charts/grafana-stack --strict

      - name: Package chart
        run: |
          helm package charts/grafana-stack

      - name:  Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GHCR_TOKEN}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Push chart
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          helm push grafana-stack-*.tgz "oci://ghcr.io/${OWNER_LC}/charts"
